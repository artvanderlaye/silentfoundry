<title>Contact — Silent Foundry</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23c9a84c'/%3E%3Ctext x='50' y='67' font-family='Arial' font-weight='bold' font-size='44' text-anchor='middle' fill='%230a0a0a'%3ESF%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Josefin+Sans:wght@200;300;400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{--black:#0a0a0a;--white:#f4f1ec;--cream:#ede8e0;--accent:#c8a96e;--mid:#6b6560;--gdk:#8a6e3a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--black);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:44px 48px 14px;transition:opacity 0.4s;overflow:visible;}
nav::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(237,232,224,0.98) 0%,transparent 100%);pointer-events:none;}
nav.scrolled{opacity:0.3;}nav.scrolled:hover{opacity:1;}
.nav-logo{position:relative;z-index:1;flex-shrink:0;text-decoration:none;display:block;width:240px;height:80px;margin-left:-20px;transition:width 0.4s ease,height 0.4s ease;}
.nav-right{display:flex;align-items:center;gap:8px;position:relative;z-index:1;}
.nbtn{font-family:'DM Sans',sans-serif;font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;background:none;border:0.5px solid rgba(10,10,10,0.25);color:rgba(10,10,10,0.5);padding:4px 10px;text-decoration:none;transition:all 0.2s;cursor:pointer;}
.nbtn:hover{color:rgba(10,10,10,0.9);}
.nbtn-en{background:rgba(200,169,110,0.1);border:0.5px solid rgba(200,169,110,0.5);color:rgba(200,169,110,0.9);font-family:'DM Sans',sans-serif;font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;padding:4px 10px;}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;position:relative;z-index:1;}
.nav-toggle span{display:block;width:24px;height:1px;background:rgba(10,10,10,0.6);transition:all 0.3s;}
.mmenu{display:none;position:fixed;inset:0;background:#ede8e0;z-index:99;flex-direction:column;justify-content:center;align-items:center;gap:24px;}
.mmenu.open{display:flex;}
.mmenu a{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.12em;color:rgba(10,10,10,0.7);text-decoration:none;text-transform:uppercase;}
@media(max-width:900px){nav{padding:14px 24px;}.nav-right{display:flex!important;}.nav-home{display:none!important;}.nav-toggle{display:flex;}.nav-logo{width:120px;height:60px;margin-left:-20px;}}
footer{background:#0a0a0a;padding:0;display:block;border-top:none;}
.footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;padding:72px 48px 48px;position:relative;align-items:start;}
.footer-tagline{font-size:clamp(0.7rem,0.85vw,0.8rem);line-height:1.8;color:#6b6560;max-width:280px;}
.footer-col h5{font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(200,169,110,0.5);margin-bottom:20px;}
.footer-col address,.footer-col a{font-size:clamp(0.7rem,0.85vw,0.8rem);line-height:1.8;color:#6b6560;font-style:normal;display:block;text-decoration:none;margin-bottom:0;}
.footer-col a:hover{color:#f4f1ec;}
.footer-bottom{padding:16px 48px;background:#0a0a0a;border-top:1px solid rgba(244,241,236,0.06);display:flex;justify-content:space-between;}
.footer-bottom span{font-size:0.52rem;color:rgba(244,241,236,0.25);letter-spacing:0.12em;}
.sf-footer-triangle{position:absolute;bottom:24px;right:48px;pointer-events:none;opacity:0.5;}

#pc{min-height:60vh;}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes blink{50%{opacity:0;}}
@media(max-width:900px){
  nav{padding:14px 24px !important;}
  .nav-right{display:flex!important;}
  .nav-home{display:none!important;}
  .nav-toggle{display:flex;}
  .nav-logo{width:120px !important;height:60px !important;margin-left:-20px !important;}
}
@media(max-width:1024px){
  /* v8 Newspaper — collapse 5-col to 1-col */
  div[style*="grid-template-columns:1fr 1px 1fr 1px 1fr"]{grid-template-columns:1fr !important;}
  div[style*="repeat(3,1fr)"][style*="padding:80px 48px"]{grid-template-columns:1fr !important;padding:48px 24px !important;}
  div[style*="grid-template-columns:1fr 1fr;gap:16px"]{grid-template-columns:1fr !important;}
  div[style*="padding:180px 48px 0"]{padding:120px 24px 32px !important;}
  div[style*="padding:180px 48px 0"] > div > div:nth-child(2){display:none!important;}
  div[style*="padding:180px 48px 0"] > div > div:nth-child(4){display:none!important;}
  .contact-img{width:100%!important;height:200px!important;margin-top:16px!important;}
  /* Footer */
  .footer-inner{grid-template-columns:1fr !important;gap:24px !important;padding:40px 24px 32px !important;}
  .footer-bottom{flex-direction:column;gap:8px;padding:16px 24px;}
}
@media(max-width:1024px){
  div[style*="grid-template-columns:1fr 1fr;gap:0;border-top"]{grid-template-columns:1fr!important;}
  div[style*="padding:72px 48px;"]{padding:40px 24px!important;}
  div[style*="padding:72px 48px 72px 72px"]{padding:40px 24px!important;border-left:none!important;border-top:0.5px solid rgba(10,10,10,0.1)!important;}
  div[style*="border-right:0.5px solid rgba(10,10,10,0.08)"]{border-right:none!important;}
  div[style*="repeat(4,1fr)"]{grid-template-columns:1fr 1fr!important;gap:1px!important;}
  div[style*="repeat(3,1fr)"][style*="padding:80px 48px"]{grid-template-columns:1fr!important;padding:48px 24px!important;}
}
</style>

function clApply(idx){
  var L=CLAYOUTS[idx];
  var slot=document.getElementById('clsw-slot');
  if(!slot) return;
  slot.innerHTML=L.fn();
  document.querySelectorAll('.clsw-btn').forEach(function(b,i){b.classList.toggle('active',i===idx);});
}
document.addEventListener('DOMContentLoaded',function(){
  var pc=document.getElementById('pc');
  if(!pc) return;
  var slot=document.createElement('div');
  slot.id='clsw-slot';
  var footer=document.querySelector('footer');
  var footerBottom=document.querySelector('.footer-bottom');
  var children=Array.from(pc.childNodes).filter(function(c){
    return c!==footer && !(c.classList&&c.classList.contains('footer-bottom'));
  });
  children.forEach(function(c){slot.appendChild(c);});
  pc.insertBefore(slot,pc.firstChild);
  var bar=document.getElementById('clayout-bar');
  CLAYOUTS.forEach(function(L,i){
    var btn=document.createElement('button');
    btn.className='clsw-btn'+(i===0?' active':'');
    btn.innerHTML=L.name;
    btn.onclick=function(){clApply(i);};
    bar.appendChild(btn);
  });
  clApply(0);
});
</script>
